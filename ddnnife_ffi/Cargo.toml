[package]
name = "ddnnife_ffi"
description = "d-DNNF FFI bindings"
version = "0.7.0"
authors = ["Heiko Raab <heiko.raab@uni-ulm-de>", "Chico Sundermann <chico.sundermann@uni-ulm.de>", "Jan Baudisch <jan.baudisch@uni-ulm.de>"]
edition = "2021"
license = "LGPL-3.0-or-later"
workspace = ".."

[lib]
crate-type = ["cdylib"]

[dependencies]
ddnnife = { workspace = true, features = ["d4"] }
uniffi = { workspace = true }
itertools = "0.14"
num = { workspace = true }
